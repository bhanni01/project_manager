services:
  db:
    image: postgres:16-alpine
    container_name: project_manager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pt
      POSTGRES_PASSWORD: pt
      POSTGRES_DB: project_tracker
    ports:
      - "5433:5432"
    volumes:
      - pt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pt -d project_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pt_pgdata:
